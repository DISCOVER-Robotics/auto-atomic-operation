defaults:
  - stack_color_blocks
  - _self_

gs_dir: assets/gs/scenes/stack_color_blocks
bg_dir: third_party/press_da_button/gs_playground/models/robots/manipulation/franka_emika_panda_robotiq/3dgs

env:
  env:
    _target_: auto_atom.basis.gs_mujoco_env.GSUnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.gs_mujoco_env.GSEnvConfig
      model_path: assets/xmls/scenes/stack_color_blocks/demo_gs.xml
      cameras:
        - name: front
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      gaussian_render:
        background_ply: ${bg_dir}/background.ply
        body_gaussians:
          cube_blue_gs:   ${gs_dir}/cube_blue.ply
          cube_yellow_gs: ${gs_dir}/cube_yellow.ply
          cube_orange_gs: ${gs_dir}/cube_orange.ply
