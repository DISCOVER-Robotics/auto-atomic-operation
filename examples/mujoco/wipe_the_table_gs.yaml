defaults:
  - wipe_the_table
  - _self_

gs_dir: assets/gs/scenes/wipe_the_table
bg_dir: third_party/press_da_button/gs_playground/models/robots/manipulation/franka_emika_panda_robotiq/3dgs

env:
  env:
    _target_: auto_atom.basis.gs_mujoco_env.GSUnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.gs_mujoco_env.GSEnvConfig
      model_path: assets/xmls/scenes/wipe_the_table/demo_gs.xml
      cameras:
        - name: front
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      gaussian_render:
        background_ply: ${bg_dir}/background.ply
        body_gaussians:
          blue_duck_gs:              ${gs_dir}/blue_duck.ply
          chicken_doll_gs:           ${gs_dir}/chicken_doll.ply
          dog_gs:                    ${gs_dir}/dog.ply
          white_box_gs:              ${gs_dir}/box.ply
          yellow_brush_gs:           ${gs_dir}/yellow_brush.ply
          transparent_tape_paper_gs: ${gs_dir}/transparent_tape_paper.ply
