env:
  _target_: auto_atom.runtime.ComponentRegistry.register_env
  name: open_hinge_door
  env:
    _target_: auto_atom.basis.mujoco_env.UnifiedMujocoEnv
    config:
      _target_: auto_atom.basis.mujoco_env.EnvConfig
      model_path: assets/xmls/scenes/open_hinge_door/demo.xml
      operators:
        - name: arm
          arm_actuators: []
          eef_actuators: [fingers_actuator]
          eef_output_name: eef
          pose_site: eef_pose
      enabled_sensors:
        - camera
        - pose
        - joint_position
        - joint_velocity
        - joint_effort
      sim_freq: 500
      update_freq: 25
      mask_objects: ["handle", "door"]
      operations: ["pull"]
      cameras:
        - name: hand_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
          parent_frame: eef_pose
        - name: front_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
        - name: side_cam
          width: 640
          height: 480
          enable_color: true
          enable_depth: true
          enable_mask: false
          enable_heat_map: false
      viewer:
        lookat: [-0.2, 0.0, 0.55]
        distance: 1.5
        azimuth: 290
        elevation: -20
        step_delay: 0.025
        hold_seconds: 1.0

backend: auto_atom.backend.mjc.mujoco_backend.build_mujoco_backend

task:
  env_name: open_hinge_door
  seed: 42
  stages:
    # Pull handle of hinge_door_1 to swing it open.
    # Door hinge at +Y edge of panel; handle at (-0.05, -0.117, 0) relative to door body.
    # Handle world pos: cabinet(0,0,0) + door(-0.185,0,0.5575) + handle(-0.05,-0.117,0)
    #                 = (-0.235, -0.117, 0.5575)
    # Gripper horizontal (rot_x=pi/2): points +X toward cabinet, fingers in +-Z.
    - name: pull_open
      object: handle
      operation: pull
      operator: arm
      param:
        pre_move:
          # Step 1: align 10 cm in front of handle (-X direction)
          - position: [-0.10, 0.0, 0.0]
            reference: object_world
          # Step 2: advance to handle grasp position
          - position: [0.0, 0.0, 0.0]
            reference: object_world
        eef:
          close: true
        post_move:
          # Pull back 10 cm in -X; hinge constraint converts straight pull into door swing
          - position: [-0.10, 0.0, 0.0]
            reference: eef_world

operators:
  - name: arm
    role: manipulator
